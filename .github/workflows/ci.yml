name: ci
env:
  OPENAI_API_KEY: "dummy"
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.10"
          enable-cache: true
          activate-environment: true
      - name: Install Reflex
        run: uv pip install -r requirements.txt pyright
      - name: Run Pyright
        run: pyright .

  check-ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.10"
          enable-cache: true
          activate-environment: true
      - name: Install Reflex
        run: uv pip install -r requirements.txt
      - name: Run Ruff
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0

  check-export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.10"
          enable-cache: true
          activate-environment: true
      - name: Install Reflex
        run: uv pip install -r requirements.txt

      - name: Initialize Reflex
        run: reflex init

      - name: Build frontend
        run: reflex export
